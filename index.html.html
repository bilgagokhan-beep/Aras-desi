<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Aras Desi">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Aras Kargo Desi | Gökhan Bilga</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:10px}
        .c{background:#141414;border-radius:16px;padding:16px 14px;width:100%;max-width:400px;border:1px solid #2a2a2a}
        .h{text-align:center;margin-bottom:12px}
        .l{font-size:1.3em;font-weight:800;color:#ff5c00;letter-spacing:2px}
        .mb{background:#1a1a1a;border:2px solid #2a2a2a;border-radius:20px;padding:8px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;cursor:pointer}
        .mb:active{transform:scale(.97)}
        .mb.a{border-color:#00c853;box-shadow:0 0 12px rgba(0,200,83,.15)}
        .mb.e{border-color:#ff1744}
        .md{width:10px;height:10px;border-radius:50%;background:#444;flex-shrink:0}
        .mb.a .md{background:#00c853;animation:p .8s infinite}
        .mb.e .md{background:#ff1744}
        @keyframes p{0%,100%{box-shadow:0 0 5px #00c853}50%{box-shadow:0 0 15px #00c853}}
        .mt{flex:1;color:#888;font-size:.65em;font-weight:500}
        .mb.a .mt{color:#00c853}
        .mi{font-size:1.1em}
        .pr{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
        .pb{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:9px 4px;cursor:pointer;text-align:center}
        .pb:active{background:#ff5c00;border-color:#ff5c00;transform:scale(.93)}
        .pd{font-size:.75em;font-weight:700;color:#fff;white-space:nowrap}
        .pl{font-size:.5em;color:#777;margin-top:1px}
        .fr{display:flex;gap:5px;margin-bottom:5px;align-items:center}
        .fr label{color:#888;font-size:.6em;font-weight:600;width:20px;text-align:center;flex-shrink:0}
        .ib{flex:1;display:flex;align-items:center;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;overflow:hidden}
        .ib input{flex:1;background:0 0;border:none;padding:9px 10px;color:#fff;font-size:.9em;outline:0;width:100%;min-width:0}
        .ib .u{color:#ff5c00;font-weight:700;font-size:.6em;padding-right:8px}
        .nr{display:flex;gap:3px;flex-wrap:wrap}
        .nb{background:#1a1a1a;border:1px solid #2a2a2a;color:#999;padding:4px 6px;border-radius:4px;font-size:.55em;cursor:pointer;flex:1;text-align:center;min-width:24px}
        .nb:active{background:#ff5c00;color:#fff;border-color:#ff5c00;transform:scale(.9)}
        .res{margin-top:10px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:12px;text-align:center;display:none}
        .res.s{display:block;border-color:#ff5c00;box-shadow:0 0 15px rgba(255,92,0,.12)}
        .dv{font-size:2.5em;font-weight:900;color:#ff5c00;line-height:1}
        .ds{color:#777;font-size:.6em;letter-spacing:1px;margin-top:2px}
        .ac{display:flex;gap:5px;margin-top:8px}
        .btn{flex:1;padding:11px;border:none;border-radius:7px;font-size:.7em;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
        .btn:active{transform:scale(.95)}
        .bc{background:#ff5c00;color:#fff;flex:2}
        .br{background:#1a1a1a;color:#999;border:1px solid #2a2a2a}
        .sig{text-align:center;margin-top:12px;padding-top:10px;border-top:1px solid #1a1a1a}
        .sn{font-family:'Dancing Script','Great Vibes',cursive;font-size:1.2em;color:#ff5c00;text-shadow:0 0 6px rgba(255,92,0,.15);letter-spacing:1px;opacity:.85}
        .ss{font-family:'Dancing Script','Great Vibes',cursive;font-size:.65em;color:#555;letter-spacing:1px}
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Great+Vibes&display=swap');
        @media(max-width:350px){.pd{font-size:.7em}.dv{font-size:2.2em}}
    </style>
</head>
<body>
<div class="c">
    <div class="h"><div class="l">ARAS KARGO DESİ</div></div>
    
    <div class="mb" id="mb" onclick="tm()">
        <span class="md" id="md"></span>
        <span class="mi">🎤</span>
        <span class="mt" id="mt">Dinlemek için dokun</span>
    </div>

    <div class="pr">
        <div class="pb" onclick="qc(15,25,35)"><div class="pd">15×25×35</div><div class="pl">Mini</div></div>
        <div class="pb" onclick="qc(20,30,40)"><div class="pd">20×30×40</div><div class="pl">Küçük</div></div>
        <div class="pb" onclick="qc(30,40,50)"><div class="pd">30×40×50</div><div class="pl">Orta</div></div>
        <div class="pb" onclick="qc(40,50,60)"><div class="pd">40×50×60</div><div class="pl">Büyük</div></div>
        <div class="pb" onclick="qc(50,60,70)"><div class="pd">50×60×70</div><div class="pl">XL</div></div>
        <div class="pb" onclick="qc(60,60,60)"><div class="pd">60×60×60</div><div class="pl">Küp</div></div>
    </div>

    <div class="fr"><label>En</label><div class="ib"><input type="number" id="en" placeholder="cm" step="0.1" min="0" inputmode="decimal"><span class="u">cm</span></div></div>
    <div class="nr"><span class="nb" onclick="sv('en',10)">10</span><span class="nb" onclick="sv('en',15)">15</span><span class="nb" onclick="sv('en',20)">20</span><span class="nb" onclick="sv('en',25)">25</span><span class="nb" onclick="sv('en',30)">30</span><span class="nb" onclick="sv('en',40)">40</span><span class="nb" onclick="sv('en',50)">50</span><span class="nb" onclick="sv('en',60)">60</span></div>

    <div class="fr" style="margin-top:7px"><label>Boy</label><div class="ib"><input type="number" id="boy" placeholder="cm" step="0.1" min="0" inputmode="decimal"><span class="u">cm</span></div></div>
    <div class="nr"><span class="nb" onclick="sv('boy',10)">10</span><span class="nb" onclick="sv('boy',15)">15</span><span class="nb" onclick="sv('boy',20)">20</span><span class="nb" onclick="sv('boy',25)">25</span><span class="nb" onclick="sv('boy',30)">30</span><span class="nb" onclick="sv('boy',40)">40</span><span class="nb" onclick="sv('boy',50)">50</span><span class="nb" onclick="sv('boy',60)">60</span></div>

    <div class="fr" style="margin-top:7px"><label>Yük</label><div class="ib"><input type="number" id="yuk" placeholder="cm" step="0.1" min="0" inputmode="decimal"><span class="u">cm</span></div></div>
    <div class="nr"><span class="nb" onclick="sv('yuk',10)">10</span><span class="nb" onclick="sv('yuk',15)">15</span><span class="nb" onclick="sv('yuk',20)">20</span><span class="nb" onclick="sv('yuk',25)">25</span><span class="nb" onclick="sv('yuk',30)">30</span><span class="nb" onclick="sv('yuk',40)">40</span><span class="nb" onclick="sv('yuk',50)">50</span><span class="nb" onclick="sv('yuk',60)">60</span></div>

    <div class="res" id="rb"><div class="ds">DESİ DEĞERİ</div><div class="dv" id="dv">0</div><div class="ds" id="fm"></div></div>

    <div class="ac"><button class="btn bc" onclick="cl()">⚡ HESAPLA</button><button class="btn br" onclick="rs()">SIFIRLA</button></div>

    <div class="sig"><div class="sn">By Desing Gökhan Bilga</div><div class="ss">design & development</div></div>
</div>

<script>
let rec=null,mo=!1,me=!1;
function tm(){me?(me=!1,sm()):mo?pm():sm()}
function sm(){
    const S=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!S){um('e','Tarayıcı desteklemiyor');return}
    rec=new S;rec.lang='tr-TR';rec.continuous=!0;rec.interimResults=!1;
    rec.onresult=e=>{
        const t=e.results[e.results.length-1][0].transcript.toLowerCase();
        const n=t.match(/\d+/g);
        if(n&&n.length>=3){
            document.getElementById('en').value=n[0];document.getElementById('boy').value=n[1];document.getElementById('yuk').value=n[2];
            cl();um('a','✅ Hesaplandı!');
        }else if(n&&n.length===1){
            if(!document.getElementById('en').value)sv('en',n[0]);
            else if(!document.getElementById('boy').value)sv('boy',n[0]);
            else if(!document.getElementById('yuk').value)sv('yuk',n[0]);
            else{document.getElementById('en').value=n[0];document.getElementById('boy').value='';document.getElementById('yuk').value=''}
            ac();
        }
    };
    rec.onerror=e=>{if(e.error==='not-allowed'){me=!0;pm();um('e','İzin reddedildi')}};
    rec.onend=()=>{if(mo&&!me)setTimeout(()=>{if(mo)try{rec.start()}catch(e){}},200)};
    try{rec.start();mo=!0;me=!1;um('a','🟢 Dinliyor... 20 30 40 deyin')}catch(e){um('e','Başlatılamadı')}
}
function pm(){mo=!1;try{rec.stop()}catch(e){}um('','Dinlemek için dokun')}
function um(s,t){
    const b=document.getElementById('mb'),d=document.getElementById('md'),x=document.getElementById('mt');
    b.className='mb';
    if(s==='a'){b.classList.add('a');d.style.background='#00c853'}
    else if(s==='e'){b.classList.add('e');d.style.background='#ff1744'}
    else{d.style.background='#444'}
    x.textContent=t;
}
function qc(e,b,y){document.getElementById('en').value=e;document.getElementById('boy').value=b;document.getElementById('yuk').value=y;cl();if(navigator.vibrate)navigator.vibrate(8)}
function sv(i,v){document.getElementById(i).value=v;ac();if(navigator.vibrate)navigator.vibrate(5)}
function ac(){const e=+document.getElementById('en').value,b=+document.getElementById('boy').value,y=+document.getElementById('yuk').value;if(e>0&&b>0&&y>0)cl()}
function cl(){
    const e=+document.getElementById('en').value,b=+document.getElementById('boy').value,y=+document.getElementById('yuk').value;
    if(!e||!b||!y||e<=0||b<=0||y<=0)return;
    const d=(e*b*y)/3000,r=Math.round(d*100)/100;
    document.getElementById('dv').textContent=r.toFixed(2);
    document.getElementById('fm').textContent=e+' × '+b+' × '+y+' ÷ 3000';
    document.getElementById('rb').classList.add('s');
    if('speechSynthesis' in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(r.toFixed(2)+' desi');u.lang='tr-TR';u.rate=1.4;u.volume=1;window.speechSynthesis.speak(u)}
}
function rs(){document.getElementById('en').value='';document.getElementById('boy').value='';document.getElementById('yuk').value='';document.getElementById('rb').classList.remove('s');if('speechSynthesis' in window)window.speechSynthesis.cancel();document.getElementById('en').focus()}
document.querySelectorAll('input').forEach(i=>{i.addEventListener('input',ac);i.addEventListener('focus',function(){this.select()})});
window.addEventListener('load',()=>{document.getElementById('en').focus()});
</script>
</body>
</html>
